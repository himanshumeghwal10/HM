<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS — Social Media Calendar Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --accent3: #6af7c8;
    --accent4: #f76a8a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --client1: #7c6af7;
    --client2: #f7a26a;
    --client3: #6af7c8;
    --client4: #f76a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* TOP NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .nav-badge {
    font-size: 0.7rem;
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* MAIN LAYOUT */
  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 3rem 0 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 1rem;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* CLIENT TABS */
  .client-tabs {
    display: flex;
    gap: 0.5rem;
    margin: 2rem 0 1.5rem;
    background: var(--surface);
    padding: 0.4rem;
    border-radius: 14px;
    border: 1px solid var(--border);
    animation: fadeUp 0.7s ease both;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .client-tab {
    flex: 1;
    min-width: 140px;
    padding: 0.7rem 1rem;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .client-tab .tab-num {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--border);
    color: var(--muted);
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .client-tab.active {
    color: var(--text);
    background: var(--card);
  }

  .client-tab[data-client="1"].active { box-shadow: 0 0 0 1px var(--client1)20, inset 0 0 20px var(--client1)08; }
  .client-tab[data-client="2"].active { box-shadow: 0 0 0 1px var(--client2)20, inset 0 0 20px var(--client2)08; }
  .client-tab[data-client="3"].active { box-shadow: 0 0 0 1px var(--client3)20, inset 0 0 20px var(--client3)08; }
  .client-tab[data-client="4"].active { box-shadow: 0 0 0 1px var(--client4)20, inset 0 0 20px var(--client4)08; }

  .client-tab[data-client="1"].active .tab-num { background: var(--client1); color: white; }
  .client-tab[data-client="2"].active .tab-num { background: var(--client2); color: #000; }
  .client-tab[data-client="3"].active .tab-num { background: var(--client3); color: #000; }
  .client-tab[data-client="4"].active .tab-num { background: var(--client4); color: white; }

  /* CLIENT PANEL */
  .client-panel { display: none; animation: fadeUp 0.4s ease both; }
  .client-panel.active { display: block; }

  /* GRID */
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .input-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input, textarea, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--card); }

  /* PLATFORM PILLS */
  .platform-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .platform-pill {
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .platform-pill.selected {
    border-color: currentColor;
    color: white;
    background: transparent;
  }

  .platform-pill[data-p="Instagram"].selected { color: #e1306c; background: #e1306c15; }
  .platform-pill[data-p="YouTube"].selected { color: #ff0000; background: #ff000015; }
  .platform-pill[data-p="LinkedIn"].selected { color: #0077b5; background: #0077b515; }
  .platform-pill[data-p="Twitter/X"].selected { color: #aaa; background: #aaa15; }
  .platform-pill[data-p="Facebook"].selected { color: #1877f2; background: #1877f215; }
  .platform-pill[data-p="TikTok"].selected { color: #69c9d0; background: #69c9d015; }
  .platform-pill[data-p="Pinterest"].selected { color: #e60023; background: #e6002315; }
  .platform-pill[data-p="Threads"].selected { color: #a0a0a0; background: #a0a0a015; }

  /* GENERATE BUTTON */
  .generate-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 1rem;
    letter-spacing: 0.3px;
  }

  .generate-btn[data-client="1"] { background: linear-gradient(135deg, var(--client1), #a78bfa); color: white; }
  .generate-btn[data-client="2"] { background: linear-gradient(135deg, var(--client2), #fcd34d); color: #000; }
  .generate-btn[data-client="3"] { background: linear-gradient(135deg, var(--client3), #34d399); color: #000; }
  .generate-btn[data-client="4"] { background: linear-gradient(135deg, var(--client4), #f472b6); color: white; }

  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .generate-btn .btn-shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shine 3s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%,100% { left: 150%; }
  }

  /* LOADING */
  .loading-state {
    text-align: center;
    padding: 3rem;
    display: none;
  }

  .loading-state.active { display: block; }

  .spinner-ring {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .loading-step {
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.4s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .loading-step.show { opacity: 1; transform: translateY(0); }
  .loading-step.done { color: var(--accent3); }

  /* RESULT AREA */
  .result-area { display: none; }
  .result-area.active { display: block; animation: fadeUp 0.5s ease both; }

  /* CALENDAR HEADER */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: gap;
    gap: 1rem;
  }

  .calendar-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .calendar-actions {
    display: flex;
    gap: 0.5rem;
  }

  .action-btn {
    padding: 0.4rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* WEEK STRIP */
  .week-nav {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0.25rem;
  }

  .week-btn {
    flex-shrink: 0;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .week-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* DAY CARDS */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.75rem;
  }

  @media (max-width: 900px) {
    .day-grid { grid-template-columns: repeat(4, 1fr); }
    .input-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 1.8rem; }
  }

  @media (max-width: 600px) {
    .day-grid { grid-template-columns: repeat(2, 1fr); }
    .app { padding: 1rem; }
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 0.85rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .day-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .day-card.has-post::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .day-card[data-client="1"].has-post::before { background: var(--client1); }
  .day-card[data-client="2"].has-post::before { background: var(--client2); }
  .day-card[data-client="3"].has-post::before { background: var(--client3); }
  .day-card[data-client="4"].has-post::before { background: var(--client4); }

  .day-label {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.3rem;
  }

  .day-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .post-preview {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-platform-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .post-badge {
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .rest-day {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
  }

  .rest-day span {
    font-size: 0.7rem;
    color: var(--border);
    font-style: italic;
  }

  /* POST MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .modal-date {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { border-color: var(--accent4); color: var(--accent4); }

  .post-content-type {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 1rem;
    border: 1px solid currentColor;
  }

  .modal-caption {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.5rem;
    white-space: pre-wrap;
  }

  .modal-section-title {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .hashtag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }

  .hashtag {
    font-size: 0.78rem;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .modal-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .meta-item label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 0.25rem;
  }

  .meta-item span {
    font-size: 0.85rem;
    color: var(--text);
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    margin: 2rem 0;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* CLIENT FORM CARD */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .form-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-card-title .icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .scrollable-result {
    max-height: 600px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0 1.5rem;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* STRATEGY CHIPS */
  .strategy-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .strategy-chip {
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--surface);
  }

  /* INSIGHT CARDS */
  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin: 1rem 0;
  }

  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .insight-card .inum {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 0.2rem;
  }

  .insight-card .ilabel {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.4;
  }

  @media (max-width: 700px) {
    .insight-grid { grid-template-columns: 1fr 1fr; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .modal-meta-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-dot"></div>
    ContentOS
  </div>
  <div class="nav-badge">4 CLIENTS ACTIVE</div>
</nav>

<div class="app">

  <div class="hero">
    <h1>Your Content <span>Command Center</span></h1>
    <p>Fill in each client's details and generate a full AI-researched 4-week content calendar with platform-specific posts, captions & hashtags.</p>
  </div>

  <!-- CLIENT TABS -->
  <div class="client-tabs">
    <button class="client-tab active" data-client="1" onclick="switchClient(1)">
      <span class="tab-num">1</span>
      <span class="tab-name">Client One</span>
    </button>
    <button class="client-tab" data-client="2" onclick="switchClient(2)">
      <span class="tab-num">2</span>
      <span class="tab-name">Client Two</span>
    </button>
    <button class="client-tab" data-client="3" onclick="switchClient(3)">
      <span class="tab-num">3</span>
      <span class="tab-name">Client Three</span>
    </button>
    <button class="client-tab" data-client="4" onclick="switchClient(4)">
      <span class="tab-num">4</span>
      <span class="tab-name">Client Four</span>
    </button>
  </div>

  <!-- PANELS -->
  <div id="panel-1" class="client-panel active"></div>
  <div id="panel-2" class="client-panel"></div>
  <div id="panel-3" class="client-panel"></div>
  <div id="panel-4" class="client-panel"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="postModal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-top">
      <div>
        <div class="modal-date" id="modalDate"></div>
        <div id="modalType" class="post-content-type"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-section-title">📝 Caption</div>
    <div class="modal-caption" id="modalCaption"></div>
    <div class="modal-section-title">🏷️ Hashtags</div>
    <div class="hashtag-cloud" id="modalHashtags"></div>
    <div class="modal-section-title">📌 Posting Notes</div>
    <div id="modalNotes" style="font-size:0.85rem;color:var(--muted);line-height:1.6;"></div>
    <div class="modal-meta-grid">
      <div class="meta-item">
        <label>Best Time to Post</label>
        <span id="modalTime">—</span>
      </div>
      <div class="meta-item">
        <label>Content Format</label>
        <span id="modalFormat">—</span>
      </div>
      <div class="meta-item">
        <label>Goal</label>
        <span id="modalGoal">—</span>
      </div>
      <div class="meta-item">
        <label>Platform</label>
        <span id="modalPlatform">—</span>
      </div>
    </div>
  </div>
</div>

<script>
const PLATFORMS = ['Instagram','YouTube','LinkedIn','Twitter/X','Facebook','TikTok','Pinterest','Threads'];
const PLATFORM_ICONS = {
  'Instagram': '📸', 'YouTube': '▶️', 'LinkedIn': '💼',
  'Twitter/X': '𝕏', 'Facebook': '📘', 'TikTok': '🎵',
  'Pinterest': '📌', 'Threads': '🧵'
};
const CLIENT_COLORS = ['#7c6af7','#f7a26a','#6af7c8','#f76a8a'];
const CLIENT_BG = ['#7c6af720','#f7a26a20','#6af7c820','#f76a8a20'];

let clientData = {};
let calendarData = {};

// Build each panel
for (let c = 1; c <= 4; c++) {
  buildPanel(c);
}

function buildPanel(c) {
  const color = CLIENT_COLORS[c-1];
  const bg = CLIENT_BG[c-1];
  const panel = document.getElementById(`panel-${c}`);

  panel.innerHTML = `
    <div class="form-card">
      <div class="form-card-title">
        <div class="icon" style="background:${bg};color:${color}">🏢</div>
        Client ${c} — Business Profile
      </div>

      <div class="input-grid">
        <div class="input-group">
          <label>Business / Brand Name</label>
          <input type="text" id="c${c}-name" placeholder="e.g. Bloom Bakery" oninput="updateTabName(${c})">
        </div>
        <div class="input-group">
          <label>Industry / Niche</label>
          <input type="text" id="c${c}-industry" placeholder="e.g. Artisan Bakery, Wellness, SaaS...">
        </div>
        <div class="input-group full">
          <label>What do you sell / offer?</label>
          <textarea id="c${c}-offer" placeholder="Describe your products/services, what makes you unique..."></textarea>
        </div>
        <div class="input-group">
          <label>Target Audience</label>
          <input type="text" id="c${c}-audience" placeholder="e.g. Women 25-40, urban professionals">
        </div>
        <div class="input-group">
          <label>Brand Tone / Personality</label>
          <select id="c${c}-tone">
            <option value="">Select tone...</option>
            <option>Inspirational & Uplifting</option>
            <option>Professional & Authoritative</option>
            <option>Fun & Playful</option>
            <option>Minimalist & Aesthetic</option>
            <option>Educational & Informative</option>
            <option>Bold & Edgy</option>
            <option>Warm & Community-Driven</option>
            <option>Luxury & Premium</option>
          </select>
        </div>
        <div class="input-group">
          <label>Main Goal</label>
          <select id="c${c}-goal">
            <option value="">Select goal...</option>
            <option>Brand Awareness</option>
            <option>Lead Generation</option>
            <option>Sales & Conversions</option>
            <option>Community Building</option>
            <option>Website Traffic</option>
            <option>App Downloads</option>
            <option>Thought Leadership</option>
          </select>
        </div>
        <div class="input-group">
          <label>Posting Frequency</label>
          <select id="c${c}-freq">
            <option value="">Select...</option>
            <option value="3">3x per week</option>
            <option value="5">5x per week</option>
            <option value="7">Daily</option>
            <option value="2">2x per week</option>
          </select>
        </div>
        <div class="input-group">
          <label>Competitors / Inspiration</label>
          <input type="text" id="c${c}-comp" placeholder="e.g. @brandname, competitor.com">
        </div>
      </div>

      <div class="input-group" style="margin-bottom:1rem">
        <label>Active Platforms</label>
        <div class="platform-grid" id="c${c}-platforms">
          ${PLATFORMS.map(p => `
            <div class="platform-pill" data-p="${p}" onclick="togglePlatform(${c}, '${p}', this)">
              ${PLATFORM_ICONS[p]} ${p}
            </div>
          `).join('')}
        </div>
      </div>

      <div class="input-group">
        <label>Any Upcoming Events / Campaigns?</label>
        <input type="text" id="c${c}-events" placeholder="e.g. Diwali sale, product launch, webinar on 20th...">
      </div>
    </div>

    <button class="generate-btn" data-client="${c}" onclick="generateCalendar(${c})" id="gen-btn-${c}">
      <div class="btn-shine"></div>
      ✦ Generate AI Content Calendar for Client ${c}
    </button>

    <div class="loading-state" id="loading-${c}">
      <div class="spinner-ring"></div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem">Researching your niche...</div>
      <div class="loading-steps" id="steps-${c}">
        <div class="loading-step" id="step-${c}-1">🔍 Analyzing industry trends</div>
        <div class="loading-step" id="step-${c}-2">📊 Identifying viral content patterns</div>
        <div class="loading-step" id="step-${c}-3">🎯 Tailoring to your audience</div>
        <div class="loading-step" id="step-${c}-4">📅 Building 4-week calendar</div>
        <div class="loading-step" id="step-${c}-5">✍️ Writing captions & hashtags</div>
      </div>
    </div>

    <div class="result-area" id="result-${c}"></div>
  `;
}

function updateTabName(c) {
  const val = document.getElementById(`c${c}-name`).value;
  const tab = document.querySelector(`.client-tab[data-client="${c}"] .tab-name`);
  tab.textContent = val || `Client ${c}`;
}

function switchClient(c) {
  document.querySelectorAll('.client-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.client-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.client-tab[data-client="${c}"]`).classList.add('active');
  document.getElementById(`panel-${c}`).classList.add('active');
}

function togglePlatform(c, name, el) {
  el.classList.toggle('selected');
}

function getSelectedPlatforms(c) {
  return [...document.querySelectorAll(`#c${c}-platforms .platform-pill.selected`)].map(el => el.dataset.p);
}

async function generateCalendar(c) {
  const name = document.getElementById(`c${c}-name`).value.trim();
  const industry = document.getElementById(`c${c}-industry`).value.trim();
  const offer = document.getElementById(`c${c}-offer`).value.trim();
  const audience = document.getElementById(`c${c}-audience`).value.trim();
  const tone = document.getElementById(`c${c}-tone`).value;
  const goal = document.getElementById(`c${c}-goal`).value;
  const freq = document.getElementById(`c${c}-freq`).value || '3';
  const comp = document.getElementById(`c${c}-comp`).value.trim();
  const events = document.getElementById(`c${c}-events`).value.trim();
  const platforms = getSelectedPlatforms(c);

  if (!name || !industry) {
    alert('Please fill in at least Brand Name and Industry.');
    return;
  }

  if (platforms.length === 0) {
    alert('Please select at least one platform.');
    return;
  }

  // Show loading
  document.getElementById(`gen-btn-${c}`).disabled = true;
  document.getElementById(`loading-${c}`).classList.add('active');
  document.getElementById(`result-${c}`).classList.remove('active');

  // Animate steps
  const stepDelays = [400, 1000, 1800, 2700, 3800];
  stepDelays.forEach((delay, i) => {
    setTimeout(() => {
      const s = document.getElementById(`step-${c}-${i+1}`);
      s.classList.add('show');
      if (i > 0) document.getElementById(`step-${c}-${i}`).classList.add('done');
    }, delay);
  });

  const platformList = platforms.join(', ');
  const postsPerWeek = parseInt(freq);
  const totalPosts = postsPerWeek * 4;

  const prompt = `You are an expert social media strategist and content creator. Create a detailed 4-week social media content calendar for the following business.

BUSINESS DETAILS:
- Brand Name: ${name}
- Industry/Niche: ${industry}
- Products/Services: ${offer || 'Not specified'}
- Target Audience: ${audience || 'General audience'}
- Brand Tone: ${tone || 'Engaging and authentic'}
- Main Goal: ${goal || 'Brand Awareness'}
- Platforms: ${platformList}
- Posting Frequency: ${postsPerWeek}x per week (${totalPosts} posts total over 4 weeks)
- Competitors/Inspiration: ${comp || 'Not specified'}
- Upcoming Events/Campaigns: ${events || 'None specified'}

Create EXACTLY ${totalPosts} posts spread across 4 weeks (${postsPerWeek} posts per week). 

IMPORTANT: Respond ONLY with a valid JSON object. No markdown, no backticks, no explanation before or after. Just pure JSON.

The JSON must follow this exact structure:
{
  "strategy": {
    "summary": "2-3 sentence content strategy overview",
    "contentMix": ["type1 X%", "type2 X%", "type3 X%"],
    "bestPostingTimes": "best time windows for ${platformList}",
    "keyThemes": ["theme1", "theme2", "theme3", "theme4"]
  },
  "stats": {
    "totalPosts": ${totalPosts},
    "platforms": ${platforms.length},
    "contentTypes": 5,
    "hashtagSets": ${totalPosts}
  },
  "weeks": [
    {
      "weekNum": 1,
      "theme": "Week 1 theme name",
      "posts": [
        {
          "day": "Mon",
          "date": "Apr 7",
          "platform": "${platforms[0]}",
          "contentType": "Reel/Carousel/Story/Post/Thread/Video",
          "topic": "Short topic title",
          "caption": "Full engaging caption with emojis, 100-150 words, tailored to the brand tone and audience",
          "hashtags": ["#tag1", "#tag2", "#tag3", "#tag4", "#tag5", "#tag6", "#tag7", "#tag8"],
          "bestTime": "7:00 PM",
          "goal": "Engagement/Awareness/Sales/Traffic",
          "notes": "Visual direction and posting tip, 1-2 sentences"
        }
      ]
    }
  ]
}

Make every caption unique, creative, and aligned with the brand's tone. Vary content types (educational, entertaining, promotional, user engagement, behind-the-scenes, trending). Include relevant industry hashtags. Spread posts across different days of each week.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 8000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');

    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch (e) {
      // Try to extract JSON
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else throw new Error('Failed to parse response');
    }

    calendarData[c] = parsed;
    document.getElementById(`loading-${c}`).classList.remove('active');
    document.getElementById(`gen-btn-${c}`).disabled = false;
    renderCalendar(c, parsed);

  } catch (err) {
    console.error(err);
    document.getElementById(`loading-${c}`).classList.remove('active');
    document.getElementById(`gen-btn-${c}`).disabled = false;
    alert('Error generating calendar. Please try again.');
  }
}

function renderCalendar(c, data) {
  const color = CLIENT_COLORS[c-1];
  const bg = CLIENT_BG[c-1];
  const resultEl = document.getElementById(`result-${c}`);
  const name = document.getElementById(`c${c}-name`).value || `Client ${c}`;

  let html = `
    <div class="section-divider">✦ Content Strategy</div>
    <div class="form-card">
      <div class="form-card-title">
        <div class="icon" style="background:${bg};color:${color}">🎯</div>
        Strategy Overview — ${name}
      </div>
      <p style="color:var(--muted);font-size:0.9rem;line-height:1.7;margin-bottom:1rem">${data.strategy?.summary || ''}</p>
      <div class="modal-section-title">Content Mix</div>
      <div class="strategy-row">
        ${(data.strategy?.contentMix || []).map(m => `<div class="strategy-chip">${m}</div>`).join('')}
      </div>
      <div class="modal-section-title" style="margin-top:0.75rem">Key Themes</div>
      <div class="strategy-row">
        ${(data.strategy?.keyThemes || []).map(t => `<div class="strategy-chip" style="border-color:${color}40;color:${color}">✦ ${t}</div>`).join('')}
      </div>
      <div style="margin-top:0.75rem;font-size:0.82rem;color:var(--muted)">
        ⏰ Best Posting Times: <span style="color:var(--text)">${data.strategy?.bestPostingTimes || '—'}</span>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num" style="color:${color}">${data.stats?.totalPosts || 0}</div>
        <div class="stat-label">Total Posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:${color}">${data.stats?.platforms || 0}</div>
        <div class="stat-label">Platforms</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:${color}">4</div>
        <div class="stat-label">Weeks Covered</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:${color}">${data.stats?.hashtagSets || 0}</div>
        <div class="stat-label">Hashtag Sets</div>
      </div>
    </div>

    <div class="section-divider">✦ 4-Week Content Calendar</div>
  `;

  // Week nav
  html += `<div class="week-nav" id="week-nav-${c}">
    ${(data.weeks || []).map((w, i) => `
      <button class="week-btn ${i===0?'active':''}" onclick="showWeek(${c}, ${i})" id="wbtn-${c}-${i}">
        Week ${w.weekNum}: ${w.theme}
      </button>
    `).join('')}
  </div>`;

  // Week calendars
  (data.weeks || []).forEach((week, wi) => {
    html += `<div class="scrollable-result" id="week-content-${c}-${wi}" style="${wi > 0 ? 'display:none' : ''}">`;

    // Build 7-day grid
    const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const postMap = {};
    (week.posts || []).forEach(p => { postMap[p.day] = p; });

    html += `<div class="day-grid" style="margin-bottom:2rem">`;
    DAYS.forEach(day => {
      const post = postMap[day];
      if (post) {
        const postId = `${c}-${wi}-${day}`;
        html += `
          <div class="day-card has-post" data-client="${c}" onclick="openPost('${postId}')">
            <div class="day-label">${day}</div>
            <div class="day-num">${post.date || ''}</div>
            <div class="post-preview">${post.topic || ''}</div>
            <div class="post-platform-badges">
              <span class="post-badge" style="background:${bg};color:${color}">${PLATFORM_ICONS[post.platform] || '📱'} ${post.contentType || ''}</span>
            </div>
          </div>`;
        // Store post data for modal
        if (!window._posts) window._posts = {};
        window._posts[postId] = { ...post, color, bg };
      } else {
        html += `
          <div class="day-card" data-client="${c}">
            <div class="day-label">${day}</div>
            <div class="rest-day"><span>Rest day</span></div>
          </div>`;
      }
    });
    html += `</div>`;
    html += `</div>`;
  });

  resultEl.innerHTML = html;
  resultEl.classList.add('active');
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showWeek(c, wi) {
  document.querySelectorAll(`[id^="week-content-${c}-"]`).forEach((el, i) => {
    el.style.display = i === wi ? 'block' : 'none';
  });
  document.querySelectorAll(`[id^="wbtn-${c}-"]`).forEach((el, i) => {
    el.classList.toggle('active', i === wi);
  });
}

function openPost(postId) {
  const post = window._posts?.[postId];
  if (!post) return;

  document.getElementById('modalDate').textContent = `${post.day}, ${post.date}`;
  document.getElementById('modalType').textContent = `${PLATFORM_ICONS[post.platform] || '📱'} ${post.platform} — ${post.contentType}`;
  document.getElementById('modalType').style.color = post.color;
  document.getElementById('modalType').style.borderColor = post.color + '60';
  document.getElementById('modalCaption').textContent = post.caption || '';
  document.getElementById('modalHashtags').innerHTML = (post.hashtags || []).map(h => `<span class="hashtag">${h}</span>`).join('');
  document.getElementById('modalNotes').textContent = post.notes || '—';
  document.getElementById('modalTime').textContent = post.bestTime || '—';
  document.getElementById('modalFormat').textContent = post.contentType || '—';
  document.getElementById('modalGoal').textContent = post.goal || '—';
  document.getElementById('modalPlatform').textContent = post.platform || '—';

  document.getElementById('postModal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target.id === 'postModal' || e.target.classList.contains('modal-close')) {
    document.getElementById('postModal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });
</script>
</body>
</html>
